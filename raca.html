<!doctype html>
<html lang="pt-PT">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Raça | Meat Azores</title>
    <meta name="description" content="Conheça esta raça Meat Azores: origem, território, valor patrimonial, peças e produtores associados." />

    <!-- Não indexar esta página -->
    <meta name="robots" content="noindex,follow" />
    <meta name="googlebot" content="noindex,follow" />

    <!-- Theme / ícones -->
    <meta name="theme-color" content="#000000" />
    <link rel="shortcut icon" href="assets/favicon.png" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/styleguide.css" />
    <link rel="stylesheet" href="css/style.css" />

    <!-- Vercel Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
    <div class="element-producer">

        <!-- Hero -->
        <div class="image-3" id="raca-hero-wrapper">
            <img class="image-4" id="raca-hero" src="" alt="" />
        </div>

        <main class="frame-19">

            <!-- Cabeçalho: imagem, tipo, nome, localização -->
            <header class="header-2">
                <img class="clip-path-group-2" id="raca-imagem" src="" alt="" />

                <div class="frame-20">
                    <p class="produtor-de-carne" id="raca-tipo"></p>
                    <h1 class="text-wrapper-24" id="raca-nome"></h1>

                    <div class="info">
                        <div class="location-wrapper">
                            <div class="location">
                                <div class="hugeicons-eco-power-2">
                                    <img src="assets/localizacao.svg" alt="" />
                                </div>
                                <p class="text-wrapper-25" id="raca-localizacao"></p>
                            </div>
                        </div>
                    </div>
                    <div id="raca-logo-container" hidden></div>
                </div>
            </header>

            <!-- Sobre a raça -->
            <section class="group-2" aria-labelledby="sec-sobre">
                <div class="frame-21">
                    <h2 id="sec-sobre" class="text-wrapper-26">Sobre a raça</h2>
                    <p class="text-wrapper-27" id="raca-descricao-curta"></p>
                </div>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Introdução -->
            <section id="sec-introducao-secao" class="frame-22" aria-labelledby="sec-introducao">
                <div class="creators-4">
                    <h2 id="sec-introducao" class="text-wrapper-31">Introdução</h2>
                </div>
                <p class="text-wrapper-32" id="raca-introducao"></p>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Origem e ligação ao território -->
            <section id="sec-origem-secao" class="frame-22" aria-labelledby="sec-origem">
                <div class="creators-4">
                    <h2 id="sec-origem" class="text-wrapper-31">Origem e ligação ao território</h2>
                </div>
                <p class="text-wrapper-32" id="raca-origem-territorio"></p>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Valor patrimonial e cultural -->
            <section id="sec-valor-secao" class="frame-22" aria-labelledby="sec-valor">
                <div class="creators-4">
                    <h2 id="sec-valor" class="text-wrapper-31">Valor patrimonial e cultural</h2>
                </div>
                <p class="text-wrapper-32" id="raca-valor-patrimonial"></p>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Características gerais -->
            <section id="sec-caracteristicas-secao" class="frame-22" aria-labelledby="sec-caracteristicas">
                <div class="creators-3">
                    <div class="frame-23">
                        <h2 id="sec-caracteristicas" class="heading-xl">Características gerais</h2>
                    </div>
                </div>
                <div id="raca-caracteristicas"></div>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Secções extra (opcional, preenchido por JS) -->
            <div id="raca-secoes-extra"></div>

            <!-- Peças associadas -->
            <section id="sec-pecas-secao" class="content-3" aria-labelledby="sec-pecas">
                <div class="div-4">
                    <div class="frame-26">
                        <h2 id="sec-pecas" class="heading-xl">Peças associadas</h2>
                    </div>
                    <div id="raca-pecas"></div>
                </div>
                <img class="separator-4" src="assets/separator.svg" alt="" />
            </section>

            <!-- Produtores associados -->
            <section id="sec-produtores-secao" class="content-3" aria-labelledby="sec-produtores">
                <div class="div-4">
                    <div class="frame-26">
                        <h2 id="sec-produtores" class="heading-xl">Produtores associados</h2>
                    </div>
                    <div id="raca-produtores"></div>
                </div>
                <img class="separator-4" src="assets/separator.svg" alt="" />
            </section>

            <!-- Galeria -->
            <section id="sec-galeria-secao" class="frame-22" aria-labelledby="sec-galeria">
                <div class="creators-4">
                    <h2 id="sec-galeria" class="text-wrapper-31">Galeria</h2>
                </div>
                <div id="raca-galeria" style="display: flex; flex-wrap: wrap; gap: 8px; width: 100%;"></div>
            </section>

            <!-- Outras raças -->
            <section id="sec-outras-racas-secao" class="outras-racas" aria-labelledby="sec-outras-racas" hidden>
                <div class="outras-racas__header">
                    <h2 id="sec-outras-racas" class="heading-xl">Outras raças</h2>
                    <a href="#" class="outras-racas__ver-todas" aria-label="Ver todas as raças">Ver todas</a>
                </div>
                <div id="raca-outras-racas" class="outras-racas__lista" aria-label="Lista de outras raças"></div>
            </section>

        </main>

        <!-- Barra de ações -->
        <div class="scanning">
            <header class="header" aria-label="Ações">
                <a href="index.html" class="button-cancel" aria-label="Fechar">
                    <span class="img-wrapper">
                        <img class="close-square" src="assets/back.svg" alt="" />
                    </span>
                </a>
            </header>
        </div>

    </div>

    <script src="js/raca.js"></script>
    <script src="js/nav.js"></script>
</body>

</html>
