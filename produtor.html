<!doctype html>
<html lang="pt-PT">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Produtor | Meat Azores</title>
    <meta name="description" content="Conheça este produtor Meat Azores: história, exploração, maneio, alimentação e peças associadas." />

    <!-- Não indexar esta página -->
    <meta name="robots" content="noindex,follow" />
    <meta name="googlebot" content="noindex,follow" />

    <!-- Theme / ícones -->
    <meta name="theme-color" content="#000000" />
    <link rel="shortcut icon" href="assets/favicon.png" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/styleguide.css" />
    <link rel="stylesheet" href="css/style.css" />

    <!-- Vercel Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
    <div class="element-producer">

        <!-- Hero -->
        <div class="image-3" id="produtor-hero-wrapper">
            <img class="image-4" id="produtor-hero" src="" alt="" />
        </div>

        <main class="frame-19">

            <!-- Cabeçalho: thumb, tipo, nome, localização -->
            <header class="header-2">
                <img class="clip-path-group-2" id="produtor-thumb" src="" alt="" />

                <div class="frame-20">
                    <p class="produtor-de-carne" id="produtor-tipo"></p>
                    <h1 class="text-wrapper-24" id="produtor-nome"></h1>

                    <div class="info">
                        <div class="location-wrapper">
                            <div class="location">
                                <div class="hugeicons-eco-power-2">
                                    <img src="assets/localizacao.svg" alt="" />
                                </div>
                                <p class="text-wrapper-25" id="produtor-localizacao"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Sobre o produtor -->
            <section class="group-2" aria-labelledby="sec-sobre">
                <div class="frame-21">
                    <h2 id="sec-sobre" class="text-wrapper-26">Sobre o produtor</h2>
                    <p class="text-wrapper-27" id="produtor-descricao-curta"></p>
                </div>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- História -->
            <section id="sec-historia-secao" class="frame-22" aria-labelledby="sec-historia">
                <div class="creators-4">
                    <h2 id="sec-historia" class="text-wrapper-31">História</h2>
                </div>
                <p class="text-wrapper-32" id="produtor-historia"></p>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Exploração em números -->
            <section id="sec-numeros-secao" class="frame-22" aria-labelledby="sec-numeros">
                <div class="creators-3">
                    <div class="frame-23">
                        <h2 id="sec-numeros" class="heading-xl">Exploração em números</h2>
                    </div>
                </div>
                <div class="nutritions-2" role="list" id="produtor-numeros"></div>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Maneio e alimentação -->
            <section id="sec-maneio-secao" class="frame-22" aria-labelledby="sec-maneio">
                <div class="creators-4">
                    <h2 id="sec-maneio" class="text-wrapper-31">Maneio e Alimentação</h2>
                </div>
                <p class="text-wrapper-32" id="produtor-maneio"></p>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Ligação à raça -->
            <section id="sec-ligacao-secao" class="frame-22" aria-labelledby="sec-ligacao">
                <div class="creators-4">
                    <h2 id="sec-ligacao-titulo" class="text-wrapper-31">Ligação à raça</h2>
                </div>
                <p class="text-wrapper-32" id="produtor-ligacao-raca"></p>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Nota especial -->
            <section id="sec-nota-secao" class="frame-22" aria-labelledby="sec-nota">
                <div class="creators-4">
                    <h2 id="sec-nota" class="text-wrapper-31">Nota especial</h2>
                </div>
                <p class="text-wrapper-32" id="produtor-nota-especial"></p>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Peças associadas -->
            <section id="sec-pecas-secao" class="content-3" aria-labelledby="sec-pecas">
                <div class="div-4">
                    <div class="frame-26">
                        <h2 id="sec-pecas" class="heading-xl">Peças associadas</h2>
                    </div>
                    <div id="produtor-pecas"></div>
                </div>
                <img class="separator-4" src="assets/separator.svg" alt="" />
            </section>

            <!-- Raça -->
            <section id="sec-racas-secao" class="content-3" aria-labelledby="sec-racas">
                <div class="div-4">
                    <div class="frame-26">
                        <h2 id="sec-racas" class="heading-xl">Raça</h2>
                    </div>
                    <div id="produtor-racas"></div>
                </div>
                <img class="separator-4" src="assets/separator.svg" alt="" />
            </section>

            <!-- Galeria -->
            <section id="sec-galeria-secao" class="frame-22" aria-labelledby="sec-galeria">
                <div class="creators-4">
                    <h2 id="sec-galeria" class="text-wrapper-31">Galeria</h2>
                </div>
                <div id="produtor-galeria" style="display: flex; flex-wrap: wrap; gap: 8px; width: 100%;"></div>
            </section>

        </main>

        <!-- Barra de ações -->
        <div class="scanning">
            <header class="header" aria-label="Ações">
                <a href="index.html" class="button-cancel" aria-label="Fechar">
                    <span class="img-wrapper">
                        <img class="close-square" src="assets/back.svg" alt="" />
                    </span>
                </a>
            </header>
        </div>

    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="Imagem ampliada">
        <button class="lightbox__close" aria-label="Fechar imagem">×</button>
        <img class="lightbox__img" src="" alt="" />
    </div>

    <script src="js/lightbox.js"></script>
    <script src="js/produtor.js"></script>
    <script src="js/nav.js"></script>
</body>

</html>
