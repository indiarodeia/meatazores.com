<!doctype html>
<html lang="pt-PT">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Restaurante | Meat Azores</title>
    <meta name="description" content="Conheça este destino gastronómico Meat Azores e as peças associadas." />

    <!-- Não indexar esta página -->
    <meta name="robots" content="noindex,follow" />
    <meta name="googlebot" content="noindex,follow" />

    <!-- Theme / ícones -->
    <meta name="theme-color" content="#000000" />
    <link rel="shortcut icon" href="assets/favicon.png" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/styleguide.css" />
    <link rel="stylesheet" href="css/style.css" />

    <!-- Vercel Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
    <div class="element-producer">

        <!-- Hero -->
        <div class="image-3" id="restaurante-hero-wrapper">
            <img class="image-4" id="restaurante-hero" src="" alt="" />
        </div>

        <main class="frame-19">

            <!-- Cabeçalho: imagem, tipo, nome, localização -->
            <header class="header-2">
                <img class="clip-path-group-2" id="restaurante-imagem" src="" alt="" />

                <div class="frame-20">
                    <p class="produtor-de-carne" id="restaurante-tipo"></p>
                    <h1 class="text-wrapper-24" id="restaurante-nome"></h1>

                    <div class="info">
                        <div class="location-wrapper">
                            <div class="location">
                                <div class="hugeicons-eco-power-2">
                                    <img src="assets/localizacao.svg" alt="" />
                                </div>
                                <p class="text-wrapper-25" id="restaurante-localizacao"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Sobre o restaurante -->
            <section class="group-2" aria-labelledby="sec-sobre">
                <div class="frame-21">
                    <h2 id="sec-sobre" class="text-wrapper-26">Sobre o restaurante</h2>
                    <p class="text-wrapper-27" id="restaurante-descricao-curta"></p>
                </div>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Texto principal -->
            <section id="sec-texto-secao" class="frame-22" aria-labelledby="sec-texto">
                <div class="creators-4">
                    <h2 id="sec-texto" class="text-wrapper-31">Destino gastronómico</h2>
                </div>
                <p class="text-wrapper-32" id="restaurante-texto-principal"></p>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <!-- Peças associadas -->
            <section id="sec-pecas-secao" class="content-3" aria-labelledby="sec-pecas">
                <div class="div-4">
                    <div class="frame-26">
                        <h2 id="sec-pecas" class="heading-xl">Peças associadas</h2>
                    </div>
                    <div id="restaurante-pecas"></div>
                </div>
                <img class="separator-4" src="assets/separator.svg" alt="" />
            </section>

            <!-- CTA -->
            <section id="sec-cta-secao" class="frame-22" aria-labelledby="sec-cta">
                <div class="creators-4">
                    <h2 id="sec-cta" class="text-wrapper-31">Rastreabilidade</h2>
                </div>
                <p class="text-wrapper-32" id="restaurante-cta"></p>
            </section>

        </main>

        <!-- Barra de ações -->
        <div class="scanning">
            <header class="header" aria-label="Ações">
                <a href="index.html" class="button-cancel" aria-label="Fechar">
                    <span class="img-wrapper">
                        <img class="close-square" src="assets/back.svg" alt="" />
                    </span>
                </a>
            </header>
        </div>

    </div>

    <script src="js/restaurante.js"></script>
    <script src="js/nav.js"></script>
</body>

</html>
