<!doctype html>
<html lang="pt-PT">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Peça | Meat Azores</title>
    <meta name="description" content="Conheça esta peça Meat Azores: origem, características, criação e alimentação, produtor e raça." />

    <!-- Não indexar esta página -->
    <meta name="robots" content="noindex,follow" />
    <meta name="googlebot" content="noindex,follow" />

    <!-- Theme / ícones -->
    <meta name="theme-color" content="#000000" />
    <link rel="shortcut icon" href="assets/favicon.png" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/styleguide.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="element-product">
        <div class="details-scan">
            <div class="image"></div>

            <div class="bg">
                <div class="div"></div>
            </div>

            <main class="detail-content">

                <!-- Topo: título, edição, selecionado/confeccionado por -->
                <div class="top">
                    <div class="frame">
                        <h1 class="text-wrapper" id="peca-titulo"></h1>
                        <p class="p" id="peca-subtitulo"></p>
                    </div>

                    <p class="div-2" id="peca-selecionado-wrapper">
                        <span class="span">Selecionado por </span>
                        <span class="text-wrapper-2" id="peca-selecionado-por"></span>
                    </p>

                    <p class="div-2" id="peca-confeccionado-wrapper">
                        <span class="span">Confeccionado por </span>
                        <span class="text-wrapper-2" id="peca-confeccionado-por"></span>
                    </p>
                </div>

                <!-- Secção principal da peça -->
                <section class="frame-2" aria-labelledby="sec-esta-peca">
                    <h2 id="sec-esta-peca" class="heading-xl">Esta peça</h2>
                    <p class="text-wrapper-4" id="peca-descricao"></p>
                </section>

                <img class="separator" src="assets/separator.svg" alt="" />

                <!-- Características -->
                <section id="sec-caracteristicas-secao" class="frame-3" aria-labelledby="sec-caracteristicas">
                    <div class="creators">
                        <h2 id="sec-caracteristicas" class="heading-xl">Características</h2>
                    </div>
                    <div class="nutritions" id="peca-caracteristicas"></div>
                </section>

                <img class="separator" src="assets/separator.svg" alt="" />

                <!-- Criação e Alimentação -->
                <section id="sec-criacao-secao" class="frame-8" aria-labelledby="sec-criacao-alimentacao">
                    <div class="frame-9" id="peca-criacao"></div>
                </section>

                <img class="separator" src="assets/separator.svg" alt="" />

                <!-- O que poderá esperar -->
                <section id="sec-esperar-secao" class="frame-8" aria-labelledby="sec-o-que-esperar">
                    <h2 id="sec-o-que-esperar" class="heading-xl">O que poderá esperar</h2>
                    <p class="sabor-intenso-e" id="peca-o-que-esperar"></p>
                </section>

                <!-- É uma carne com terroir -->
                <section id="sec-terroir-secao" class="frame-12" aria-labelledby="sec-terroir">
                    <h2 id="peca-terroir-titulo" class="text-wrapper-14"></h2>
                    <p class="text-wrapper-4" id="peca-terroir-texto"></p>
                </section>

                <img class="separator" src="assets/separator.svg" alt="" />

                <!-- Porque é uma peça rara? -->
                <section id="sec-rara-secao" class="frame-12" aria-labelledby="sec-peca-rara">
                    <h2 id="peca-rara-titulo" class="text-wrapper-14"></h2>
                    <p class="longevidade" id="peca-rara-conteudo"></p>
                </section>

                <img class="separator" src="assets/separator.svg" alt="" />

                <!-- Certificação DOP -->
                <section id="sec-certificacao-secao" aria-labelledby="sec-certificacao">
                    <h2 id="sec-certificacao" class="visually-hidden"></h2>
                    <div id="peca-certificacao"></div>
                </section>

                <img class="separator" src="assets/separator.svg" alt="" />

                <!-- Selecionador -->
                <section id="sec-selecionador-secao" class="content" aria-label="Selecionador">
                    <div class="creators-2">
                        <div class="div-wrapper">
                            <h2 class="heading-xl">Selecionador</h2>
                        </div>
                        <div class="frame-15" id="peca-selecionador"></div>
                    </div>
                    <img class="separator-2" src="assets/separator.svg" alt="" />
                </section>

                <!-- Produtor -->
                <section id="sec-produtor-secao" class="creators-2" aria-label="Produtor">
                    <h2 class="heading-xl">Produtor</h2>
                    <div class="frame-13" id="peca-produtor"></div>
                </section>

                <!-- Raça -->
                <section id="sec-raca-secao" class="content" aria-label="Raça">
                    <div class="creators-2">
                        <div class="div-wrapper">
                            <h2 class="heading-xl">Raça</h2>
                        </div>
                        <div class="frame-15" id="peca-raca"></div>
                    </div>
                    <img class="separator-2" src="assets/separator.svg" alt="" />
                </section>

                <!-- Restaurante -->
                <section id="sec-restaurante-secao" class="content" aria-label="Destino gastronómico">
                    <div class="creators-2">
                        <div class="div-wrapper">
                            <h2 class="heading-xl">Destino gastronómico</h2>
                        </div>
                        <div class="frame-15" id="peca-restaurante"></div>
                    </div>
                    <img class="separator-2" src="assets/separator.svg" alt="" />
                </section>

                <!-- Feedback -->
                <section id="sec-feedback-secao" class="content-2" aria-labelledby="sec-feedback">
                    <div class="frame-17">
                        <img class="vuesax-bold-star" src="assets/star.svg" alt="" />
                        <h2 id="sec-feedback" class="text-wrapper-22">A sua opinião conta</h2>
                    </div>
                    <div class="frame-18">
                        <p class="text-wrapper-23" id="peca-feedback-texto"></p>
                        <a href="#" class="button button-login" id="btn-feedback" target="_blank" rel="noopener noreferrer">
                            Avaliar a experiência
                        </a>
                    </div>
                </section>

            </main>
        </div>

        <div class="scanning">
            <header class="header" aria-label="Ações">
                <a href="#" class="button-love" id="btn-header-feedback" target="_blank" rel="noopener noreferrer">
                    <span class="img-wrapper">
                        <img class="heart" src="assets/like.svg" alt="" />
                    </span>
                </a>

                <a href="index.html" class="button-cancel" aria-label="Fechar">
                    <span class="img-wrapper">
                        <img class="close-square" src="assets/back.svg" alt="" />
                    </span>
                </a>
            </header>
        </div>
    </div>

    <script src="js/peca.js"></script>
    <script src="js/nav.js"></script>
</body>

</html>
