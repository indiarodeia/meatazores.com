<!doctype html>
<html lang="pt-PT">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Parceiro | Meat Azores</title>
    <meta name="description" content="Conheça este parceiro Meat Azores e o seu papel na rastreabilidade da peça." />

    <meta name="robots" content="noindex,follow" />
    <meta name="googlebot" content="noindex,follow" />

    <meta name="theme-color" content="#000000" />
    <link rel="shortcut icon" href="assets/favicon.png" />

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/styleguide.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="element-producer">

        <div class="image-3" id="parceiro-hero-wrapper">
            <img class="image-4" id="parceiro-hero" src="" alt="" />
        </div>

        <main class="frame-19">

            <header class="header-2">
                <img class="clip-path-group-2" id="parceiro-logo" src="" alt="" />

                <div class="frame-20">
                    <p class="produtor-de-carne" id="parceiro-tipo-papel"></p>
                    <h1 class="text-wrapper-24" id="parceiro-nome"></h1>

                    <div class="info">
                        <div class="location-wrapper">
                            <div class="location">
                                <div class="hugeicons-eco-power-2">
                                    <img src="assets/localizacao.svg" alt="" />
                                </div>
                                <p class="text-wrapper-25" id="parceiro-localizacao"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <section class="group-2" aria-labelledby="sec-sobre">
                <div class="frame-21">
                    <h2 id="sec-sobre" class="text-wrapper-26">Sobre o parceiro</h2>
                    <p class="text-wrapper-27" id="parceiro-descricao-curta"></p>
                </div>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <section id="sec-texto-secao" class="frame-22" aria-labelledby="sec-texto">
                <div class="creators-4">
                    <h2 id="sec-texto" class="text-wrapper-31">Papel na Meat Azores</h2>
                </div>
                <p class="text-wrapper-32" id="parceiro-texto-principal"></p>
                <a id="parceiro-website" class="button-arrow-right-2" href="#" target="_blank" rel="noopener noreferrer" hidden>
                    <span class="text-wrapper-35">Visitar website</span>
                    <span class="iconly-light-arrow-2" aria-hidden="true"></span>
                </a>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <section id="sec-pontos-secao" class="frame-22" aria-labelledby="sec-pontos">
                <div class="creators-3">
                    <div class="frame-23">
                        <h2 id="sec-pontos" class="heading-xl">Pontos principais</h2>
                    </div>
                </div>
                <div id="parceiro-pontos" class="nutritions-2" role="list"></div>
            </section>

            <img class="separator-3" src="assets/separator.svg" alt="" />

            <section id="sec-pecas-secao" class="content-3" aria-labelledby="sec-pecas">
                <div class="div-4">
                    <div class="frame-26">
                        <h2 id="sec-pecas" class="heading-xl">Peças associadas</h2>
                    </div>
                    <div id="parceiro-pecas"></div>
                </div>
                <img class="separator-4" src="assets/separator.svg" alt="" />
            </section>

        </main>

        <div class="scanning">
            <header class="header" aria-label="Ações">
                <a href="index.html" class="button-cancel" aria-label="Fechar">
                    <span class="img-wrapper">
                        <img class="close-square" src="assets/back.svg" alt="" />
                    </span>
                </a>
            </header>
        </div>

    </div>

    <script src="js/parceiro.js"></script>
    <script src="js/nav.js"></script>
</body>

</html>
